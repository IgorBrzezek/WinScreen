# ============================================================
# ANSI 256 COLOR CODES (indices 0-255)
# ============================================================
# --- Basic 16 colors ---
#   0: black         1: red            2: green         3: brown/yellow
#   4: blue          5: magenta        6: cyan          7: white/light gray
#   8: bright black  9: bright red    10: bright green 11: bright yellow
#  12: bright blue  13: bright magenta14: bright cyan  15: bright white
#
# --- System palette 216 colors (16-231) ---
#  16- 21: blue shades
#  22- 27: green shades
#  28- 33: green-blue shades
#  34- 39: green shades
#  40- 45: green-cyan shades
#  46- 51: cyan shades
#  52- 57: navy shades
#  58- 63: green-navy shades
#  64- 69: green shades
#  70- 75: green shades
#  76- 81: green-cyan shades
#  82- 87: cyan shades
#  88- 93: purple shades
#  94- 99: yellow-brown shades
# 100-105: yellow-green shades
# 106-111: green shades
# 112-117: green-cyan shades
# 118-123: cyan shades
# 124-129: red shades
# 130-135: orange shades
# 136-141: yellow shades
# 142-147: yellow-green shades
# 148-153: green shades
# 154-159: green-cyan shades
# 160-165: red shades
# 166-171: orange shades
# 172-177: yellow shades
# 178-183: yellow-green shades
# 184-189: green shades
# 190-195: cyan shades
# 196-201: red/pink shades
# 202-207: orange/pink shades
# 208-213: yellow/pink shades
# 214-219: yellow/pink shades
# 220-225: yellow/white shades
# 226-231: yellow/white shades
#
# --- Grayscale (232-255) ---
# 232: darkest gray  233-237: dark grays
# 238-242: medium grays  243-247: light grays
# 248-252: light grays   253-255: white
#
# --- Useful colors ---
# 16: #000000 (black)         17: #00005f
# 18: #000087                  19: #0000af
# 20: #0000d7                  21: #0000ff (pure blue)
# 22: #005f00                  28: #008700
# 34: #00af00                  40: #00d700
# 46: #00ff00 (pure green)    51: #00ffff (pure cyan)
# 52: #5f0000                  88: #870000
# 124: #af0000                 160: #df0000
# 196: #ff0000 (pure red)
# 82: #5fff00                  118: #87ff00
# 154: #afff00                 190: #dfff00
# 226: #ffff00 (pure yellow)
# 93: #8700ff                  129: #af00ff
# 165: #df00ff                 201: #ff00ff (pure magenta)
# 232-255: grayscale (#080808 - #eeeeee)
# ============================================================

[statusbar]
# Status bar position: "top" or "bottom"
position = bottom

# Status bar background color (ANSI 256-color index: 0-255)
# Default: 4 (blue)
background_color = 4

# Status bar text color
# Default: 15 (bright white)
foreground_color = 15

# Active window name color
# Default: fg=14 (bright cyan), bg=4 (blue)
active_window_fg = 14
active_window_bg = 4

# Inactive window names color
# Default: fg=7 (white), bg=4 (blue)
inactive_window_fg = 7
inactive_window_bg = 4

# Symbol surrounding window names: "parens" -> (name) or "brackets" -> [name]
# Available: parens, brackets, angles, braces
window_brackets = parens

# Active window symbol
active_symbol = *

# Color of brackets surrounding the active window name
# Default: fg=14 (bright cyan), bg=4 (blue) — same as active name
active_bracket_fg = 9
active_bracket_bg = 4

# Color of brackets surrounding inactive window names
# Default: fg=7 (white), bg=4 (blue) — same as inactive name
inactive_bracket_fg = 7
inactive_bracket_bg = 4

# Whether to display the clock
show_clock = yes

# Clock format. Tokens: HH, MM, SS, DD, MO, YY, YYYY
# Separator: any character (|, :, -, /)
clock_format = HH:MM

# Clock position: "left" or "right"
clock_position = right

# Whether to display hostname on the status bar: ON / OFF
hostname = ON

# Hostname font color (ANSI 256-color index: 0-255)
# Default: 15 (bright white)
hostname_fg = 15

# Clock font color (ANSI 256-color index: 0-255)
# Default: 15 (bright white)
clock_fg = 15

# Color of separator '|' characters on the status bar (ANSI 256-color index: 0-255)
# Default: 15 (bright white)
separator_fg = 3

[shell]
# Default shell
command = cmd.exe

# Default new window name
default_name = shell

[keybindings]
# Prefix key (default Ctrl+A)
prefix = Ctrl+A

[keybinds]
# Shortcut configuration Ctrl+A + <key> -> action
# Format: key = action_name
# Available actions:
#   new_window, next_window, prev_window, last_window,
#   rename, kill_window, list_windows, select_window,
#   detach, help, redraw, scroll_up, scroll_down
#
# Default settings (uncomment and modify to override):
#c = new_window
#n = next_window
#p = prev_window
#A = rename
#a = rename
#k = kill_window
#w = list_windows
#" = select_window
#d = detach
#? = help
#l = redraw

[display]
# Main terminal area background color
# Value "default" means no override
main_background = default
